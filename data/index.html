<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radius - Wi-Fi Audio Streaming</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="background-glass"></div>
    <div class="container">
        <header>
            <h1>Radius</h1>
            <p class="subtitle">Smart Wi-Fi Audio Hub</p>
        </header>
        
        <div class="card status-card">
            <h2>Now Playing</h2>
            <div class="status-indicator">
                <div class="dot" id="status-dot"></div>
                <p id="status-text">Connecting to device...</p>
            </div>
            
            <div class="visualizer" id="visualizer">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>

        <div class="card">
            <h2>Controls</h2>
            <div class="button-group">
                <button class="btn btn-stop" onclick="stopStream()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M6 6h12v12H6z"/></svg>
                    Stop Playback
                </button>
            </div>
            <div class="volume-control">
                <label for="volume">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                </label>
                <input type="range" id="volume" min="0" max="21" step="1" onchange="setVolume(this.value)" oninput="document.getElementById('vol-val').innerText = this.value">
                <span id="vol-val" class="vol-label">10</span>
            </div>
        </div>

        <div class="card">
            <h2>Radio Presets</h2>
            <div class="preset-group">
                <button class="btn btn-preset" onclick="playPreset('http://stream.srg-ssr.ch/m/rsj/mp3_128')">📻 Radio Swiss Jazz</button>
                <button class="btn btn-preset" onclick="playPreset('http://icecast.omroep.nl/3fm-bb-mp3')">🎵 NPO 3FM</button>
                <button class="btn btn-preset" onclick="playPreset('http://stream.electroradio.ch/128kbps')">⚡ Electro Radio</button>
                <button class="btn btn-preset" onclick="playPreset('http://stream.radioparadise.com/aac-128')">🌴 Radio Paradise</button>
            </div>
        </div>

        <div class="card">
            <h2>Custom Stream</h2>
            <div class="custom-stream">
                <input type="text" id="custom-url" placeholder="http://stream-url.mp3">
                <button class="btn btn-play" onclick="playCustom()">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
                    Play
                </button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
